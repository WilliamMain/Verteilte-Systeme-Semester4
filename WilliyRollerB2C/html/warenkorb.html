<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW - Warenkorb</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css/warenkorb.css">
    <link rel="stylesheet" href="../styles.css/algemein.css">

</head>
<body>

    <!-- Suchleiste -->
    <div class="navbar">
        <div class="logo">
            <img src="../images/LogoIcon.png" alt="Logo">
            <a href="index.html" class="site-title">Rolling-Willy</a> 
        </div>
        <div class="search-container">
            <form id="search-form">
                <input type="text" id="search" placeholder="Suchen..." name="query">
                <button type="submit">Suchen</button>
            </form>
            <ul id="suggestions" style="display: none;"></ul>
        </div>
        <div class="links-container">
            <a href="index.html">Home</a>
            <a href="about.html">Über Uns</a>
            <a href="services.html">Produkte</a>
            <a href="warenkorb.html">Warenkorb</a>
        </div>
    </div>

    <!-- Warenkorb -->
    <section class="checkout-section">
        <h2>Warenkorb</h2>
        <div id="cart-items" class="cart-items">
            <p>Dein Warenkorb ist Leer.</p>
        </div>
        <div class="checkout-total">
            <h3>Gesamt: <span id="total-price">0.00</span> €</h3>
        </div>
        <div class="payment-options">
            <label for="payment-method">Zahlungsart </label>
            <select id="payment-method">
                <option value="Mastercard">Mastercard</option>
                <option value="paypal">PayPal</option>
                <option value="Bank Überweisung">Bank Überweisung</option>
            </select>
            <button class="confirm-btn" onclick="bestellungAbschliessen()">Bestellung Abschließen</button>
        </div>
    </section>
    
    <!-- Footer -->
    <footer>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="about.html">Über Uns</a>
            <a href="contact.html">Kontakt</a>
            <a href="impressum.html">Impressum</a>
            <a href="wetter.html">Wetter</a>
            <a href="../../MarkoMarkoProjekt/public/">B2B-Laden</a>
        </div>
        <p>© Rolling-Willy. Alle Rechte vorbehalten.</p>
    </footer>
    <script src="../script/index.js"></script>
    <script src="../script/Warenkorb.js"></script>
</body>
</html>
